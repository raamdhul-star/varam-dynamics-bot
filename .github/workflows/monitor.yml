name: Varam-Dynamics Monitor
# Updates open paper trade positions with current prices every hour
# Sends Telegram notification when positions close

on:
  schedule:
    - cron: '30 * * * *'    # every hour at :30 (offset from scanner at :00)
  workflow_dispatch: {}

concurrency:
  group: varam-dynamics-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update paper positions
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ACCOUNT_SIZE:       ${{ secrets.ACCOUNT_SIZE }}
        run: python main.py monitor

      - name: Commit state
        run: |
          git config user.name  "varam-dynamics-bot"
          git config user.email "varam-dynamics-bot@users.noreply.github.com"
          git add results/ || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "monitor: $(date -u +%FT%TZ)"
            # Retry pull-rebase + push up to 3 times to survive transient
            # remote errors (e.g. "commit_refs") and scanner/monitor push races.
            n=0
            until [ "$n" -ge 3 ]; do
              if git pull --rebase origin main && git push; then
                echo "Push succeeded on attempt $((n + 1))"
                exit 0
              fi
              git rebase --abort 2>/dev/null || true
              n=$((n + 1))
              echo "Push attempt $n failed; retrying in 5s..."
              sleep 5
            done
            echo "ERROR: all 3 push attempts failed"
            exit 1
          fi
